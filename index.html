<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로아 숙제 앱</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f1117;
    color:#e6e6e6;
}

/* layout */
.container {
    display:flex;
    height:100vh;
}

/* chars */
.left {
    width:240px;
    background:#141824;
    padding:10px;
    overflow-y:auto;
    border-right:1px solid #22283a;
}

.char {
    background:#1a1f2e;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    cursor:pointer;
}

.char.active { background:#4c7dff; }

.char small {
    display:block;
    color:#aaa;
}

/* main */
.right {
    flex:1;
    padding:15px;
    overflow-y:auto;
}

/* input */
.input {
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:10px;
}

input,select {
    padding:8px;
    border:none;
    border-radius:6px;
    background:#1a1f2e;
    color:white;
}

button {
    padding:7px 10px;
    border:none;
    border-radius:6px;
    background:#4c7dff;
    color:white;
    cursor:pointer;
}

/* task */
.task {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    margin:8px 0;
    background:#151a25;
    border:1px solid #22283a;
    border-radius:10px;
}

.category {
    width:60px;
    font-size:12px;
    color:#aaa;
}

/* mobile */
@media(max-width:768px){
    .container{flex-direction:column;}
    .left{
        width:100%;
        display:flex;
        overflow-x:auto;
        gap:6px;
    }
    .char{
        min-width:140px;
    }
}
</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="left">
    <button onclick="addChar()">+ 캐릭터</button>
    <div id="charList"></div>
</div>

<!-- RIGHT -->
<div class="right">

<h2>🎮 로아 숙제 앱</h2>

<div class="input">
    <input id="name" placeholder="숙제 이름">

    <select id="category">
        <option>일간</option>
        <option>주간</option>
        <option>주말</option>
        <option>물교</option>
    </select>

    <select id="type">
        <option value="count">횟수형</option>
        <option value="check">체크형</option>
    </select>

    <button onclick="addTask()">추가</button>
</div>

<div id="taskList"></div>

</div>

</div>

<script>

/* ================= DATA ================= */
let data = JSON.parse(localStorage.getItem("data")) || {
    tasks: [],
    chars: [],
    selected: 0,
    lastReset: 0
};

/* ================= INIT ================= */
if(!data.chars.length){
    data.chars.push({
        name:"캐릭터 1",
        progress:{}
    });
}

/* ================= SAVE ================= */
function save(){
    localStorage.setItem("data",JSON.stringify(data));
}

/* ================= TASK ================= */
function addTask(){
    const name=document.getElementById("name").value;
    const category=document.getElementById("category").value;
    const type=document.getElementById("type").value;

    if(!name)return;

    data.tasks.push({
        id:Date.now(),
        name,category,type
    });

    save();render();
}

/* ================= CHAR ================= */
function addChar(){
    if(data.chars.length>=15)return alert("최대 15개");

    const name=prompt("캐릭터 이름");
    if(!name)return;

    data.chars.push({
        name,
        progress:{}
    });

    data.selected=data.chars.length-1;
    save();render();
}

function selectChar(i){
    data.selected=i;
    render();
}

function getChar(){
    return data.chars[data.selected];
}

/* ================= PROGRESS ================= */
function toggle(id){
    const c=getChar();
    c.progress[id]=!c.progress[id];
    save();render();
}

function change(id,d){
    const c=getChar();
    if(!c.progress[id])c.progress[id]=0;

    c.progress[id]+=d;
    if(c.progress[id]<0)c.progress[id]=0;
    if(c.progress[id]>3)c.progress[id]=3;

    save();render();
}

/* ================= RESET ================= */
function reset(){
    const now=new Date();
    const last=new Date(data.lastReset);

    if(now.getDay()===1 && now.getHours()>=6){
        data.chars.forEach(c=>{
            c.progress={};
        });
        data.lastReset=Date.now();
        save();
    }
}

/* ================= RENDER ================= */
function render(){

    const charList=document.getElementById("charList");
    const taskList=document.getElementById("taskList");

    charList.innerHTML="";
    taskList.innerHTML="";

    /* chars */
    data.chars.forEach((c,i)=>{
        charList.innerHTML+=`
        <div class="char ${i===data.selected?"active":""}"
        onclick="selectChar(${i})">
            ${c.name}
        </div>`;
    });

    /* tasks */
    const c=getChar();

    data.tasks.forEach(t=>{

        const p=c.progress[t.id];

        taskList.innerHTML+=`
        <div class="task">

            <div style="flex:1">${t.name}</div>
            <div class="category">${t.category}</div>

            ${t.type==="count"?`
                <div>${p||0}/3</div>
                <button onclick="change(${t.id},-1)">-</button>
                <button onclick="change(${t.id},1)">+</button>
            `:`
                <input type="checkbox"
                ${p?"checked":""}
                onchange="toggle(${t.id})">
            `}

        </div>`;
    });
}

/* ================= RUN ================= */
reset();
render();

</script>

</body>
</html>
