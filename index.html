<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로아 숙제 앱</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f1117;
    color:#e6e6e6;
}

.container{
    display:flex;
    height:100vh;
}

/* LEFT */
.left{
    width:240px;
    background:#141824;
    padding:10px;
    overflow-y:auto;
    border-right:1px solid #22283a;
}

.char{
    background:#1a1f2e;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    cursor:pointer;
}

.char.active{background:#4c7dff;}

.char small{display:block;color:#aaa;}

.char button{
    margin-top:5px;
}

/* RIGHT */
.right{
    flex:1;
    padding:15px;
    overflow-y:auto;
}

.input-box{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:10px;
}

input,select{
    padding:8px;
    border:none;
    border-radius:6px;
    background:#1a1f2e;
    color:white;
}

button{
    padding:7px 10px;
    border:none;
    border-radius:6px;
    background:#4c7dff;
    color:white;
    cursor:pointer;
}

.task{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#151a25;
    border:1px solid #22283a;
    padding:10px;
    margin:8px 0;
    border-radius:10px;
}

.category{
    width:60px;
    font-size:12px;
    color:#aaa;
}

/* mobile */
@media(max-width:768px){
    .container{flex-direction:column;}

    .left{
        width:100%;
        display:flex;
        overflow-x:auto;
        gap:6px;
    }

    .char{min-width:140px;}
}
</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="left">
    <button onclick="addChar()">+ 캐릭터</button>
    <div id="charList"></div>
</div>

<!-- RIGHT -->
<div class="right">

<h2>🎮 로아 숙제 앱</h2>

<div class="input-box">
    <input id="name" placeholder="숙제 이름">

    <select id="category">
        <option>일간</option>
        <option>주간</option>
        <option>주말</option>
        <option>물교</option>
    </select>

    <select id="type">
        <option value="check">체크형</option>
        <option value="count">횟수형</option>
    </select>

    <button onclick="addTask()">추가</button>
</div>

<div class="input-box">
    <button onclick="setView('single')">선택 캐릭터</button>
    <button onclick="setView('all')">전체 보기</button>
</div>

<div id="taskList"></div>

</div>

</div>

<script>

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyAV6eg2GoplEAniflYwkQeMG3lMLHkf4mA",
  authDomain: "mobi-task.firebaseapp.com",
  projectId: "mobi-task",
  storageBucket: "mobi-task.firebasestorage.app",
  messagingSenderId: "822908775749",
  appId: "1:822908775749:web:3e0b70f1e0ca8e16b7e22c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const docRef = db.collection("loa").doc("data");

/* ================= DATA ================= */
let data;
let viewMode="single";

/* ================= DEFAULT ================= */
function defaultData(){
    return {
        tasks:[
            {id:1,name:"어비스",category:"주간",type:"check"},
            {id:2,name:"타바르타스",category:"주간",type:"check"},
            {id:3,name:"화이트 서큐버스",category:"주간",type:"check"},
            {id:4,name:"에이렐",category:"주간",type:"check"},
            {id:5,name:"필보",category:"주간",type:"check"},
            {id:6,name:"뱅가드",category:"주간",type:"count"},
            {id:7,name:"심층매어",category:"주간",type:"check"},
            {id:8,name:"골드알바",category:"주간",type:"check"},
            {id:9,name:"표바꾸기",category:"주간",type:"check"}
        ],
        chars:[
            {name:"캐릭터 1",progress:{}}
        ],
        selected:0
    };
}

/* ================= LOAD ================= */
async function load(){
    const snap = await docRef.get();
    if(snap.exists){
        data = snap.data();
    }else{
        data = defaultData();
        await save();
    }
    render();
}

/* ================= SAVE ================= */
async function save(){
    await docRef.set(data);
}

/* ================= CHAR ================= */
function addChar(){
    const name=prompt("캐릭터 이름");
    if(!name)return;

    data.chars.push({name,progress:{}});
    data.selected=data.chars.length-1;

    save();render();
}

function selectChar(i){
    data.selected=i;
    render();
}

function editChar(i){
    const name=prompt("수정",data.chars[i].name);
    if(!name)return;
    data.chars[i].name=name;
    save();render();
}

/* ================= TASK ================= */
function addTask(){
    const name=document.getElementById("name").value;
    const category=document.getElementById("category").value;
    const type=document.getElementById("type").value;

    if(!name)return;

    data.tasks.push({
        id:Date.now(),
        name,
        category,
        type
    });

    save();render();
}

/* ================= TASK EDIT ================= */
function editTask(id){
    const t=data.tasks.find(x=>x.id===id);
    const name=prompt("숙제 이름 수정",t.name);
    if(!name)return;

    t.name=name;
    save();render();
}

/* ================= TASK ORDER ================= */
function moveTask(index,dir){
    const i=index;
    const j=i+dir;

    if(j<0||j>=data.tasks.length)return;

    [data.tasks[i],data.tasks[j]]=[data.tasks[j],data.tasks[i]];

    save();render();
}

/* ================= ACTION ================= */
function toggle(id){
    const c=data.chars[data.selected];
    c.progress[id]=!c.progress[id];
    save();render();
}

function change(id,d){
    const c=data.chars[data.selected];
    if(!c.progress[id])c.progress[id]=0;

    c.progress[id]+=d;
    if(c.progress[id]<0)c.progress[id]=0;
    if(c.progress[id]>3)c.progress[id]=3;

    save();render();
}

/* ================= VIEW ================= */
function setView(m){
    viewMode=m;
    render();
}

/* ================= RENDER ================= */
function render(){

    const charList=document.getElementById("charList");
    const taskList=document.getElementById("taskList");

    charList.innerHTML="";
    taskList.innerHTML="";

    /* chars */
    data.chars.forEach((c,i)=>{
        charList.innerHTML+=`
        <div class="char ${i===data.selected?"active":""}"
        onclick="selectChar(${i})">

            ${c.name}

            <button onclick="editChar(${i})">✏</button>
        </div>`;
    });

    const c=data.chars[data.selected];

    /* ALL VIEW */
    if(viewMode==="all"){

        data.chars.forEach(ch=>{

            taskList.innerHTML+=`
            <h3 style="color:#7aa2ff">${ch.name}</h3>
            `;

            data.tasks.forEach((t,i)=>{

                const p=ch.progress[t.id];

                taskList.innerHTML+=`
                <div class="task">

                    <div style="flex:1">${t.name}</div>
                    <div class="category">${t.category}</div>

                    ${t.type==="count"?`
                        <div>${p||0}/3</div>
                    `:`
                        <input type="checkbox"
                        ${p?"checked":""}
                        onchange="toggle(${t.id})">
                    `}
                </div>`;
            });
        });

        return;
    }

    /* SINGLE VIEW */
    data.tasks.forEach((t,i)=>{

        const p=c.progress[t.id];

        taskList.innerHTML+=`
        <div class="task">

            <div style="flex:1">${t.name}</div>
            <div class="category">${t.category}</div>

            ${t.type==="count"?`
                <div>${p||0}/3</div>
                <button onclick="change(${t.id},-1)">-</button>
                <button onclick="change(${t.id},1)">+</button>
            `:`
                <input type="checkbox"
                ${p?"checked":""}
                onchange="toggle(${t.id})">
            `}

            <button onclick="editTask(${t.id})">✏</button>
            <button onclick="moveTask(${i},-1)">⬆</button>
            <button onclick="moveTask(${i},1)">⬇</button>
        </div>`;
    });
}

/* ================= START ================= */
load();

</script>

</body>
</html>
