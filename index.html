<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>모비 숙제</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f1117;
    color:#e6e6e6;
}

/* layout */
.container{
    display:flex;
    height:100vh;
}

/* left */
.left{
    width:240px;
    background:#141824;
    padding:10px;
    overflow-y:auto;
    border-right:1px solid #22283a;
}

.char{
    background:#1a1f2e;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    cursor:pointer;
}

.char.active{background:#4c7dff;}

.char small{
    display:block;
    color:#aaa;
}

/* right */
.right{
    flex:1;
    padding:15px;
    overflow-y:auto;
}

/* input */
.input-box{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:10px;
}

input,select{
    padding:8px;
    border:none;
    border-radius:6px;
    background:#1a1f2e;
    color:white;
}

button{
    padding:7px 10px;
    border:none;
    border-radius:6px;
    background:#4c7dff;
    color:white;
    cursor:pointer;
}

/* task */
.task{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#151a25;
    border:1px solid #22283a;
    padding:10px;
    margin:8px 0;
    border-radius:10px;
}

/* category */
.category{
    width:60px;
    font-size:12px;
    color:#aaa;
}

/* pinned */
.pinned{
    color:#ffd700;
    font-weight:bold;
}

/* mobile */
@media(max-width:768px){
    .container{flex-direction:column;}

    .left{
        width:100%;
        display:flex;
        overflow-x:auto;
        gap:6px;
    }

    .char{
        min-width:140px;
    }
}
</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="left">
    <button onclick="addChar()">+ 캐릭터</button>
    <div id="charList"></div>
</div>

<!-- RIGHT -->
<div class="right">

<h2>🎮 로아 숙제 앱</h2>

<!-- input -->
<div class="input-box">
    <input id="name" placeholder="숙제 이름">

    <select id="category">
        <option>일간</option>
        <option>주간</option>
        <option>주말</option>
        <option>물교</option>
    </select>

    <select id="type">
        <option value="count">횟수형</option>
        <option value="check">체크형</option>
    </select>

    <button onclick="addTask()">추가</button>
</div>

<!-- view -->
<div class="input-box">
    <button onclick="setView('single')">선택 캐릭터</button>
    <button onclick="setView('all')">전체 보기</button>
</div>

<div id="taskList"></div>

</div>

</div>

<script>

/* ================= DATA ================= */
let data = JSON.parse(localStorage.getItem("data")) || {
    tasks: [],
    chars: [],
    selected: 0
};

let viewMode = "single";

/* ================= INIT ================= */
if(!data.chars.length){
    data.chars.push({
        name:"캐릭터 1",
        progress:{}
    });
}

/* ================= SAVE ================= */
function save(){
    localStorage.setItem("data",JSON.stringify(data));
}

/* ================= TASK ================= */
function addTask(){
    const name=document.getElementById("name").value;
    const category=document.getElementById("category").value;
    const type=document.getElementById("type").value;

    if(!name)return;

    data.tasks.push({
        id:Date.now(),
        name,
        category,
        type,
        pinned:false
    });

    save();
    render();
}

/* ================= CHAR ================= */
function addChar(){
    if(data.chars.length>=15)return alert("최대 15개");

    const name=prompt("캐릭터 이름");
    if(!name)return;

    data.chars.push({
        name,
        progress:{}
    });

    data.selected=data.chars.length-1;
    save();
    render();
}

function selectChar(i){
    data.selected=i;
    render();
}

function editChar(i){
    const name=prompt("수정",data.chars[i].name);
    if(!name)return;
    data.chars[i].name=name;
    save();render();
}

function deleteChar(i){
    if(!confirm("삭제?"))return;
    data.chars.splice(i,1);
    save();render();
}

function moveChar(i,d){
    const j=i+d;
    if(j<0||j>=data.chars.length)return;
    [data.chars[i],data.chars[j]]=[data.chars[j],data.chars[i]];
    save();render();
}

/* ================= PROGRESS ================= */
function getChar(){
    return data.chars[data.selected];
}

function toggle(id){
    const c=getChar();
    c.progress[id]=!c.progress[id];
    save();render();
}

function change(id,d){
    const c=getChar();
    if(!c.progress[id])c.progress[id]=0;

    c.progress[id]+=d;
    if(c.progress[id]<0)c.progress[id]=0;
    if(c.progress[id]>3)c.progress[id]=3;

    save();render();
}

/* ================= PIN ================= */
function togglePin(id){
    const t=data.tasks.find(x=>x.id===id);
    if(!t)return;
    t.pinned=!t.pinned;
    save();render();
}

/* ================= VIEW ================= */
function setView(mode){
    viewMode=mode;
    render();
}

/* ================= RESET ================= */
function reset(){
    const now=new Date();
    if(now.getDay()===1 && now.getHours()>=6){
        data.chars.forEach(c=>{
            c.progress={};
        });
        save();
    }
}

/* ================= PROGRESS ================= */
function getProgress(c){
    let done=0;

    data.tasks.forEach(t=>{
        const p=c.progress[t.id];
        if(t.type==="check" && p)done++;
        if(t.type==="count" && p>=3)done++;
    });

    return `${done}/${data.tasks.length}`;
}

/* ================= RENDER ================= */
function render(){

    const charList=document.getElementById("charList");
    const taskList=document.getElementById("taskList");

    charList.innerHTML="";
    taskList.innerHTML="";

    /* chars */
    data.chars.forEach((c,i)=>{
        charList.innerHTML+=`
        <div class="char ${i===data.selected?"active":""}">
            <div onclick="selectChar(${i})">${c.name}</div>
            <small>${getProgress(c)}</small>
            <div>
                <button onclick="moveChar(${i},-1)">⬆</button>
                <button onclick="moveChar(${i},1)">⬇</button>
                <button onclick="editChar(${i})">✏</button>
                <button onclick="deleteChar(${i})">🗑</button>
            </div>
        </div>`;
    });

    /* view mode */
    if(viewMode==="all"){

        data.chars.forEach(c=>{

            taskList.innerHTML+=`
            <h3 style="color:#7aa2ff;margin-top:20px;">
                👤 ${c.name} (${getProgress(c)})
            </h3>
            `;

            data.tasks
            .sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0))
            .forEach(t=>{

                const p=c.progress[t.id];

                taskList.innerHTML+=`
                <div class="task">

                    <div style="flex:1 ${t.pinned?'color:#ffd700':''}">
                        ${t.pinned?"📌 ":""}${t.name}
                    </div>

                    <div class="category">${t.category}</div>

                    ${t.type==="count"?`
                        <div>${p||0}/3</div>
                        <button onclick="change(${t.id},-1)">-</button>
                        <button onclick="change(${t.id},1)">+</button>
                    `:`
                        <input type="checkbox"
                        ${p?"checked":""}
                        onchange="toggle(${t.id})">
                    `}

                    <button onclick="togglePin(${t.id})">📌</button>
                </div>`;
            });
        });

        return;
    }

    /* single view */
    const c=getChar();

    data.tasks
    .sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0))
    .forEach(t=>{

        const p=c.progress[t.id];

        taskList.innerHTML+=`
        <div class="task">

            <div style="flex:1 ${t.pinned?'color:#ffd700':''}">
                ${t.pinned?"📌 ":""}${t.name}
            </div>

            <div class="category">${t.category}</div>

            ${t.type==="count"?`
                <div>${p||0}/3</div>
                <button onclick="change(${t.id},-1)">-</button>
                <button onclick="change(${t.id},1)">+</button>
            `:`
                <input type="checkbox"
                ${p?"checked":""}
                onchange="toggle(${t.id})">
            `}

            <button onclick="togglePin(${t.id})">📌</button>
        </div>`;
    });
}

/* ================= RUN ================= */
reset();
render();

</script>

</body>
</html>
